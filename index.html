<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>머니맵 MoneyMap — 자산관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="xlsx.full.min.js"></script>
<style>
  :root{
    --sky:#62c4dc; --sky-d:#3ba8c4; --sky-l:#e8f7fb;
    --ink:#1f2d3d; --muted:#7a8a99; --line:#dfe6ec; --bg:#f4f7f9;
    --panel:#eef2f5; --green:#2e9e6b; --red:#d6536d; --amber:#e0a526;
    --blue:#3b6fd6;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Noto Sans KR","맑은 고딕","Malgun Gothic",-apple-system,Segoe UI,sans-serif;
       background:var(--bg);color:var(--ink);font-size:13px}
  /* ---- top bar ---- */
  header{background:linear-gradient(180deg,var(--sky),var(--sky-d));color:#fff;
         padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:0 2px 6px rgba(0,0,0,.12)}
  header h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.5px;white-space:nowrap}
  header .spacer{flex:1}
  .tool{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.5);color:#fff;
        padding:7px 13px;border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:600;white-space:nowrap}
  .tool:hover{background:rgba(255,255,255,.32)}
  .tool.warn:hover{background:var(--red);border-color:var(--red)}
  /* ---- tabs ---- */
  nav{display:block;background:#fff;border-bottom:2px solid var(--sky)}
  .grouprow{display:flex;flex-wrap:wrap;background:var(--sky-l);padding:0 8px}
  .grouprow button{border:none;background:none;padding:11px 18px;cursor:pointer;font-size:13.5px;
             color:var(--muted);border-bottom:3px solid transparent;font-weight:700}
  .grouprow button.active{color:var(--sky-d);border-bottom-color:var(--sky-d);background:#fff}
  .subrow{display:flex;flex-wrap:wrap;padding:2px 8px}
  .subrow button{border:none;background:none;padding:9px 14px;cursor:pointer;font-size:12.5px;
             color:var(--muted);border-bottom:2px solid transparent;font-weight:600}
  .subrow button.active{color:var(--sky-d);border-bottom-color:var(--sky-d)}
  .grouprow button:hover,.subrow button:hover{background:rgba(98,196,220,.18)}
  body.dark .grouprow button.active{background:#161f29}
  /* ---- layout ---- */
  main{padding:20px;max-width:1280px;margin:0 auto}
  .tab{display:none}
  .tab.active{display:block;animation:fade .2s}
  @keyframes fade{from{opacity:.3}to{opacity:1}}
  h2.sec{font-size:16px;margin:0 0 4px;display:flex;align-items:center;gap:8px}
  .sub{color:var(--muted);margin:0 0 16px;font-size:12.5px}
  /* ---- cards ---- */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 18px;
        box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .card .lbl{color:var(--muted);font-size:12px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .card .val{font-size:21px;font-weight:700}
  .card .delta{font-size:11.5px;margin-top:4px;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
  /* ---- tables ---- */
  .tablewrap{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:auto;
             box-shadow:0 1px 3px rgba(0,0,0,.04)}
  table{border-collapse:collapse;width:100%;font-size:12.5px;white-space:nowrap}
  th,td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--line)}
  th{background:var(--panel);color:#43586b;font-weight:700;position:sticky;top:0;font-size:12px}
  tbody tr:hover{background:var(--sky-l)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tfoot td{font-weight:700;background:#f8fbfc;border-top:2px solid var(--sky)}
  .pill{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;display:inline-block}
  .pill.ok{background:#e3f5ec;color:var(--green)}
  .pill.due{background:#fdeaee;color:var(--red)}
  .pill.soon{background:#fcf3df;color:#a9791a}
  .pill.gray{background:#eef2f5;color:var(--muted)}
  .rowact{color:var(--blue);cursor:pointer;font-weight:600}
  .rowact:hover{text-decoration:underline}
  .rowdel{color:var(--red);cursor:pointer;font-weight:600;margin-left:10px}
  /* ---- form panels (동산 입력창) ---- */
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:900px){.panels{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px 20px}
  .panel h3{margin:0 0 14px;font-size:14px;color:var(--sky-d);display:flex;align-items:center;gap:6px}
  .panel h3 .tag{background:var(--sky);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700}
  .field{display:grid;grid-template-columns:96px 1fr;align-items:center;gap:8px;margin-bottom:9px}
  .field label{color:#43586b;font-size:12px}
  .field input,.field select,.field textarea{width:100%;padding:7px 9px;border:1px solid #c9d4dc;
        border-radius:6px;font-size:12.5px;background:#fff;font-family:inherit}
  .field .hint{grid-column:2;color:var(--muted);font-size:10.5px;margin-top:-4px}
  .field textarea{resize:vertical;min-height:42px}
  .btnrow{display:flex;gap:8px;margin-top:14px}
  .btn{flex:1;padding:9px;border-radius:7px;border:none;cursor:pointer;font-weight:700;font-size:12.5px}
  .btn.save{background:var(--sky-d);color:#fff}
  .btn.save:hover{background:var(--sky)}
  .btn.del{background:#fff;color:var(--red);border:1px solid var(--red)}
  .btn.del:hover{background:var(--red);color:#fff}
  .btn.cancel{background:#fff;color:var(--muted);border:1px solid #c9d4dc}
  .btn.cancel:hover{background:#eef2f5}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  /* ---- misc ---- */
  .toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  .toolbar input,.toolbar select{padding:7px 9px;border:1px solid #c9d4dc;border-radius:6px;font-size:12.5px}
  .addbtn{background:var(--sky-d);color:#fff;border:none;padding:8px 14px;border-radius:6px;
          cursor:pointer;font-weight:700;font-size:12.5px}
  .addbtn:hover{background:var(--sky)}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .bar{height:10px;border-radius:6px;background:#eef2f5;overflow:hidden}
  .bar>span{display:block;height:100%;border-radius:6px}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;font-size:12px;color:#43586b}
  .legend span{display:flex;align-items:center;gap:6px}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);
         color:#fff;padding:11px 20px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;
         transition:.3s;z-index:99;box-shadow:0 4px 16px rgba(0,0,0,.25)}
  #toast.show{opacity:1;bottom:34px}
  .donut{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
  .barchart{display:grid;gap:9px}
  .barrow{display:grid;grid-template-columns:90px 1fr 110px;align-items:center;gap:10px;font-size:12.5px}
  .modalbk{display:none;position:fixed;inset:0;background:rgba(31,45,61,.45);z-index:50;
           align-items:center;justify-content:center}
  .modalbk.show{display:flex}
  .modal{background:#fff;border-radius:12px;padding:22px;width:480px;max-width:92vw;max-height:90vh;overflow:auto}
  .modal h3{margin:0 0 16px;font-size:15px;color:var(--sky-d)}
  /* ---- 추가 기능: 배너/차트/목표 ---- */
  .banner{background:#fff4e0;border:1px solid #f0cf8f;color:#8a5a13;padding:12px 16px;border-radius:10px;
          margin-bottom:18px;display:flex;align-items:center;gap:10px;font-weight:600;font-size:13px}
  .banner.red{background:#fdeaee;border-color:#f1b6c2;color:#b22a45}
  .banner .go{margin-left:auto;background:rgba(0,0,0,.06);padding:5px 12px;border-radius:6px;cursor:pointer;white-space:nowrap}
  .banner .go:hover{background:rgba(0,0,0,.12)}
  .chartbox{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .chartbox .lbl{color:var(--ink);font-weight:700;font-size:13px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
  @media(max-width:840px){.grid2{grid-template-columns:1fr}}
  th.sortable{cursor:pointer;user-select:none}
  th.sortable:hover{background:#e3edf2}
  .goalrow{display:grid;grid-template-columns:110px 1fr 150px;gap:10px;align-items:center;margin-bottom:8px;font-size:12.5px}
  .goalrow .over{color:var(--red);font-weight:700}
  /* ---- 다크모드 ---- */
  body.dark{--ink:#e6edf3;--muted:#93a4b4;--line:#283744;--bg:#0e151d;--panel:#18222d;--sky-l:#15303a}
  body.dark .card,body.dark .chartbox,body.dark .tablewrap,body.dark .modal,body.dark .panel{background:#161f29}
  body.dark nav{background:#161f29}
  body.dark th{background:#18222d;color:#a9bccb}
  body.dark tfoot td{background:#13202a}
  body.dark .field input,body.dark .field select,body.dark .field textarea,
  body.dark .toolbar input,body.dark .toolbar select,body.dark .goalrow input{background:#0e151d;color:#e6edf3;border-color:#283744}
  body.dark .btn.cancel,body.dark .btn.del{background:#161f29}
  body.dark th.sortable:hover{background:#1d2c38}
  /* ---- 모바일 ---- */
  @media(max-width:600px){
    header{padding:10px 12px;gap:8px}
    header h1{font-size:16px}
    header .spacer{flex:0}
    .tool{padding:6px 9px;font-size:11px}
    main{padding:12px}
    nav button{padding:9px 11px;font-size:12px}
    .field{grid-template-columns:84px 1fr}
    .goalrow{grid-template-columns:1fr;gap:4px}
    .card .val{font-size:18px}
  }
  /* ---- 인쇄/PDF ---- */
  @media print{
    header,nav,.toolbar,#toast,.modalbk,.banner .go,.rowact,.rowdel,.addbtn{display:none !important}
    main{padding:0;max-width:none}
    body{background:#fff;font-size:11px}
    .tablewrap{overflow:visible;box-shadow:none;border:1px solid #ccc}
    .chartbox,.card{box-shadow:none;break-inside:avoid}
    .grid2{grid-template-columns:1fr 1fr}
    th{position:static}
  }
</style>
</head>
<body>
<header>
  <h1>🗺️ 머니맵 <span style="font-size:12px;font-weight:600;opacity:.85">MoneyMap</span></h1>
  <span id="verbadge" style="font-size:11px;opacity:.9;cursor:pointer;background:rgba(255,255,255,.18);padding:3px 8px;border-radius:10px" onclick="showReleaseNotes()" title="릴리즈 노트 보기"></span>
  <span class="spacer"></span>
  <button class="tool" onclick="document.getElementById('xlsxfile').click()">📥 엑셀 가져오기</button>
  <button class="tool" onclick="exportExcel()">📤 엑셀 백업</button>
  <button class="tool" onclick="loadDemo()">🎲 샘플 데이터</button>
  <button class="tool" onclick="printReport()">🖨 인쇄/PDF</button>
  <button class="tool" onclick="toggleDark()" title="다크모드">🌙</button>
  <button class="tool warn" onclick="resetAll()">🗑 초기화</button>
  <span id="authbox" style="display:flex;align-items:center;gap:8px"></span>
  <input type="file" id="xlsxfile" accept=".xlsx,.xls,.csv" style="display:none" onchange="importExcel(event)">
  <input type="file" id="catfile" accept=".xlsx,.xls,.csv" style="display:none" onchange="importCategoryFile(event)">
</header>

<nav id="tabs"></nav>
<main id="content"></main>

<div id="toast"></div>
<div class="modalbk" id="modalbk"><div class="modal" id="modalbox"></div></div>

<script>
/* =========================================================================
   자산관리 시스템 — 단일 파일 웹 앱
   데이터: localStorage 에 저장 (브라우저에 영구 보관)
   ========================================================================= */

const STORE_KEY = "assetSystem_v1";
const VERSION = "1.9.2";
const RELEASE_NOTES = [
  {v:"1.9.2", d:"탭 그룹화(2단 메뉴: 대시보드·자산·가계부·분석) — 모바일에서 보기 편하게"},
  {v:"1.9.1", d:"현금흐름에 '구독'·'용돈' 분류 추가(AI·넷플릭스 구독 기록), 요약→대시보드 명칭, 용돈관리 탭 정리, 빈 데이터 안내"},
  {v:"1.9.0", d:"공모주(IPO) 탭 + 청약 캘린더(청약일·환불일·상장일·주관사·공모가), 탭별 엑셀 다운로드, 구글 본고딕(Noto Sans KR) 폰트"},
  {v:"1.8.1", d:"투자자산 종류 세분화 — 국내주식을 일반주/공모주로 분리"},
  {v:"1.8.0", d:"목표별 저축통장(여러 목표), 연말정산 세액공제 추적(연금저축·IRP), 만기·납입 알림(브라우저), 일일 사용가능액"},
  {v:"1.7.0", d:"용돈관리 탭 — 사람별 월 용돈 설정·지급, 남은 용돈·사용 기록 관리"},
  {v:"1.6.0", d:"월간 리포트·인사이트, 금융 캘린더·현금흐름 예측, 지출 자동분류 규칙, 구독·정기결제 추적"},
  {v:"1.5.0", d:"대출·부채 탭, 자산배분 목표, 인쇄/PDF, 다크모드, 모바일 최적화"},
  {v:"1.4.0", d:"순자산 추이 그래프, 도넛·막대 차트, 목표·예산 탭, 표 검색·정렬, 반복거래, 만기 알림 배너"},
  {v:"1.3.0", d:"백업 강화 — 날짜별 백업 파일, 초기화 전 자동 백업"},
  {v:"1.2.0", d:"Firebase 클라우드 동기화 + Google 로그인 (기기 간 동기화)"},
  {v:"1.1.0", d:"탭별 엑셀 업로드/양식 다운로드, 피벗분석 탭"},
  {v:"1.0.0", d:"첫 웹 버전 — 9개 탭, 엑셀 가져오기/내보내기, 브라우저 자동 저장"},
];
function showReleaseNotes(){
  openModal(`<h3>📋 릴리즈 노트 (현재 v${VERSION})</h3>
    <div style="max-height:60vh;overflow:auto">${RELEASE_NOTES.map(r=>`<div style="padding:10px 0;border-bottom:1px solid var(--line)">
      <div style="font-weight:700;color:var(--sky-d)">v${r.v} ${r.v===VERSION?'<span class="pill ok">현재</span>':''}</div>
      <div style="font-size:12.5px;margin-top:3px">${esc(r.d)}</div></div>`).join("")}</div>
    <div class="btnrow"><button class="btn cancel" onclick="closeModal()">닫기</button></div>`);
}

/* ---- 카테고리 정의 (탭) ---- */
const TABS = [
  {id:"summary",   name:"대시보드"},
  {id:"cashflow_t",name:"현금흐름_현황표"},
  {id:"input",     name:"동산 입력창"},
  {id:"cashflow",  name:"현금흐름"},
  {id:"dongsan",   name:"동산"},
  {id:"budongsan", name:"부동산"},
  {id:"invest",    name:"투자자산"},
  {id:"ipo",       name:"공모주"},
  {id:"pension",   name:"연금보험"},
  {id:"loans",     name:"대출"},
  {id:"maturity",  name:"동산만기"},
  {id:"goals",     name:"목표·예산"},
  {id:"report",    name:"리포트"},
  {id:"calendar",  name:"캘린더"},
  {id:"pivot",     name:"피벗분석"},
];

/* ---- 탭 그룹 (모바일 대응 2단 메뉴) ---- */
const GROUPS = [
  {name:"대시보드", icon:"📊", tabs:["summary"]},
  {name:"자산",     icon:"💰", tabs:["dongsan","input","maturity","budongsan","invest","ipo","pension","loans"]},
  {name:"가계부",   icon:"💵", tabs:["cashflow","cashflow_t"]},
  {name:"분석·계획",icon:"📈", tabs:["report","calendar","goals","pivot"]},
];

/* ---- 드롭다운 옵션 ---- */
const OPT = {
  투자구분: ["예금","적금","정기예금","정기적금","청약","CMA","파킹통장","외화예금"],
  세금여부: ["과세","비과세","세금우대"],
  명의자:   ["본인","아빠","엄마","배우자","자녀","공동"],
  계좌상태: ["정상","만기예정","만기.기록형","해지","휴면"],
  부동산종류:["아파트","오피스텔","빌라","단독주택","상가","토지","분양권"],
  투자종류: ["국내주식(일반주)","국내주식(공모주)","해외주식","ETF","펀드","채권","코인","금/원자재"],
  연금종류: ["연금저축","IRP","종신보험","정기보험","실손보험","변액보험","저축보험"],
  현금구분: ["수입","지출"],
  현금분류: ["급여","사업","이자/배당","임대","상여","기타수입","주거","식비","교통","통신","구독","보험료","교육","의료","여가","용돈","저축/투자","대출상환","기타지출"],
  대출종류: ["신용대출","주택담보대출","전세자금대출","마이너스통장","카드론","학자금대출","자동차할부","기타"],
  상환방식: ["원리금균등","원금균등","만기일시","마이너스(한도)"],
  공모주상태: ["예정","청약중","배정","미배정","상장","매도완료"],
};

/* 세율 (만기 이자 세후 계산용) */
const TAXRATE = {"과세":0.154,"세금우대":0.095,"비과세":0};

/* 데이터 카테고리(레코드 배열) / 수입·지출 분류 */
const CATS = ["동산","부동산","투자자산","공모주","연금보험","대출","현금흐름"];
const INCOME_CATS = ["급여","사업","이자/배당","임대","상여","기타수입"];
const EXPENSE_CATS = OPT.현금분류.filter(c=>!INCOME_CATS.includes(c));

/* ---- 데이터 모델 ---- */
let DATA = {
  동산:[], 부동산:[], 투자자산:[], 공모주:[], 연금보험:[], 대출:[], 현금흐름:[],

/* ========================== 저장/로드 ========================== */
let cloudUser=null;
function save(){
  localStorage.setItem(STORE_KEY, JSON.stringify(DATA));
  if(window.fb && window.fb.ready && cloudUser) window.fb.save(DATA);
}
function load(){
  try{ const r = localStorage.getItem(STORE_KEY); if(r) DATA = Object.assign(DATA, JSON.parse(r)); }
  catch(e){ console.warn(e); }
}
function uid(){ return "id"+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36); }

/* ========================== 유틸 ========================== */
const won = n => (isNaN(+n)||n===""||n==null) ? "-" : Math.round(+n).toLocaleString("ko-KR")+"원";
const num = n => (isNaN(+n)||n==null) ? 0 : +n;
function eok(n){ // 억/만 단위 축약
  n = num(n); if(n===0) return "0";
  const sign = n<0?"-":""; n=Math.abs(n);
  const e=Math.floor(n/1e8), m=Math.floor((n%1e8)/1e4);
  let s=""; if(e) s+=e+"억"; if(m) s+=(s?" ":"")+m.toLocaleString()+"만"; if(!s) s=n.toLocaleString();
  return sign+s;
}
function pct(n){ n=num(n); return (n*(n<1&&n>-1?100:1)).toFixed(2).replace(/\.00$/,"")+"%"; }
function rate(r){ // 0.035 또는 3.5 형태 모두 허용 → 소수로
  r=num(r); return r>1 ? r/100 : r;
}
function addMonths(dateStr, months){
  if(!dateStr) return "";
  const d=new Date(dateStr); if(isNaN(d)) return "";
  d.setMonth(d.getMonth()+num(months));
  return d.toISOString().slice(0,10);
}
function daysUntil(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr); if(isNaN(d)) return null;
  return Math.ceil((d - new Date(new Date().toDateString()))/86400000);
}
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200);
}
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* 동산 만기 계산 */
function maturityCalc(r){
  const p=num(r.예치금액), rt=rate(r.금리), m=num(r.개월);
  const matDate = addMonths(r.시작일, m);
  const interest = p*rt*(m/12);                 // 단리 가정
  const tax = interest * (TAXRATE[r.세금여부] ?? 0.154);
  const net = p + interest - tax;
  return {matDate, interest, tax, net, d:daysUntil(matDate)};
}

function curGroup(){ return GROUPS.find(g=>g.tabs.includes(curTab)) || GROUPS[0]; }
function renderTabs(){
  const cg=curGroup();
  const grp=GROUPS.map(g=>`<button class="${g===cg?'active':''}" onclick="goGroup('${g.name}')">${g.icon} ${g.name}</button>`).join("");
  const sub=cg.tabs.length>1
    ? `<div class="subrow">${cg.tabs.map(id=>{const t=TABS.find(x=>x.id===id);return t?`<button class="${id===curTab?'active':''}" onclick="go('${id}')">${t.name}</button>`:"";}).join("")}</div>`
    : "";
  document.getElementById("tabs").innerHTML = `<div class="grouprow">${grp}</div>${sub}`;
}
function goGroup(name){ const g=GROUPS.find(x=>x.name===name); if(!g) return; curTab=g.tabs[0]; renderTabs(); render(); window.scrollTo(0,0); }
function go(id){ curTab=id; renderTabs(); render(); window.scrollTo(0,0); }

/* ===== 검색 / 정렬 공통 ===== */
function tstate(cat){ return tableState[cat] || (tableState[cat]={q:"",sort:"",dir:1}); }
function onSearch(cat,v){ tstate(cat).q=v; _refocus="search_"+cat; render(); }
function sortBy(cat,f){ const s=tstate(cat); if(s.sort===f) s.dir*=-1; else {s.sort=f;s.dir=1;} render(); }
function searchBar(cat){ const s=tstate(cat);
  return `<input id="search_${cat}" placeholder="🔍 검색 (금융기관·명의자 등)" value="${esc(s.q)}"
    oninput="onSearch('${cat}',this.value)" style="min-width:200px">`; }
function sTh(cat,label,field,cls){ const s=tstate(cat);
  const ar = s.sort===field ? (s.dir>0?' ▲':' ▼') : '';
  return `<th class="sortable ${cls||''}" onclick="sortBy('${cat}','${field}')">${label}${ar}</th>`; }
function processRows(cat,rows){
  const s=tstate(cat); let r=rows;
  if(s.q){ const q=s.q.toLowerCase();
    r=r.filter(x=>Object.values(x).some(v=>String(v).toLowerCase().includes(q))); }
  if(s.sort){ r=[...r].sort((a,b)=>{
    const av=a[s.sort], bv=b[s.sort];
    const an=parseFloat(String(av).replace(/[^0-9.\-]/g,'')), bn=parseFloat(String(bv).replace(/[^0-9.\-]/g,''));
    let c; if(!isNaN(an)&&!isNaN(bn)&&String(av).trim()!==''&&String(bv).trim()!=='') c=an-bn;
    else c=String(av==null?'':av).localeCompare(String(bv==null?'':bv));
    return c*s.dir; }); }
  return r;
}

/* ---------- 요약 (대시보드) ---------- */
function totals(){
  const 동산 = DATA.동산.reduce((s,r)=>s+num(r.예치금액),0);
  const 부동산 = DATA.부동산.reduce((s,r)=>s+num(r.현재가),0);
  const 담보 = DATA.부동산.reduce((s,r)=>s+num(r.대출),0);
  const 대출 = (DATA.대출||[]).reduce((s,r)=>s+num(r.잔액),0);
  const 부채 = 담보 + 대출;
  const 투자 = DATA.투자자산.reduce((s,r)=>s+(num(r.현재가)*num(r.수량)||num(r.평가금액)),0);
  const 연금 = DATA.연금보험.reduce((s,r)=>s+num(r.납입누계),0);
  const 총자산 = 동산+부동산+투자+연금;
  return {동산,부동산:부동산,담보,대출,부채,투자,연금,총자산,순자산:총자산-부채};
}

/* ---------- 현금흐름_현황표 (월별 집계) ---------- */
function rCashTable(c){
  const map={};
  DATA.현금흐름.forEach(r=>{
    const ym=(r.일자||"").slice(0,7); if(!ym) return;
    map[ym]=map[ym]||{수입:0,지출:0};
    map[ym][r.구분==="수입"?"수입":"지출"]+=num(r.금액);
  });
  const months=Object.keys(map).sort();
  let cum=0;
  const rows=months.map(ym=>{
    const m=map[ym], net=m.수입-m.지출; cum+=net;
    return `<tr><td>${ym}</td><td class="num" style="color:var(--green)">${won(m.수입)}</td>
      <td class="num" style="color:var(--red)">${won(m.지출)}</td>
      <td class="num" style="font-weight:700;color:${net>=0?'var(--green)':'var(--red)'}">${net>=0?'+':''}${won(net)}</td>
      <td class="num">${won(cum)}</td></tr>`;}).join("");
  const tIn=months.reduce((s,m)=>s+map[m].수입,0), tOut=months.reduce((s,m)=>s+map[m].지출,0);
  c.innerHTML=`
  <h2 class="sec">📅 현금흐름_현황표</h2>
  <p class="sub">월별 수입·지출 집계 및 누적 잔액 (현금흐름 탭 데이터 기반 자동 계산)</p>
  ${months.length?`<div class="tablewrap"><table>
    <thead><tr><th>연월</th><th class="num">수입</th><th class="num">지출</th><th class="num">순흐름</th><th class="num">누적</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td>합계</td><td class="num">${won(tIn)}</td><td class="num">${won(tOut)}</td>
      <td class="num">${won(tIn-tOut)}</td><td class="num">${won(cum)}</td></tr></tfoot>
    </table></div>`:emptyBox("현금흐름 데이터가 없습니다. '현금흐름' 탭에서 입력하세요.")}`;
}

  key=String(key).trim();
  if(cat==="동산") return ALIAS[key]||key;
  return key; // 다른 카테고리는 헤더 그대로 사용
}
function importExcel(ev){
  const file=ev.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array",cellDates:true});
      let imported=0, sheetsHit=[];
      wb.SheetNames.forEach(sn=>{
        const cat=SHEET_MAP[sn.trim()]; if(!cat) return;
        const json=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:"",raw:false});
        json.forEach(row=>{
          const o={id:uid()};
          let has=false;
          Object.entries(row).forEach(([k,v])=>{
            if(v==="") return;
            o[normField(cat,k)]= (v instanceof Date)? v.toISOString().slice(0,10) : v;
            has=true;
          });
          if(cat==="현금흐름" && o.내용 && !o.분류){ const m=autoCat(o.내용); if(m) o.분류=m; }
          if(has){ DATA[cat].push(o); imported++; }
        });
        if(json.length) sheetsHit.push(`${sn}→${cat}(${json.length})`);
      });
      save(); render();
      toast(imported?`📥 ${imported}건 가져옴 [${sheetsHit.join(", ")}]`:"인식된 시트가 없습니다");
      if(!imported) alert("인식 가능한 시트(동산/부동산/투자자산/연금보험/현금흐름)를 찾지 못했습니다.\n시트명을 확인하세요.\n\n발견된 시트: "+wb.SheetNames.join(", "));
    }catch(err){ alert("가져오기 실패: "+err.message); }
    ev.target.value="";
  };
  reader.readAsArrayBuffer(file);
}
function exportExcel(){
  const wb=XLSX.utils.book_new();
  const sheets={
    동산:DATA.동산, 부동산:DATA.부동산, 투자자산:DATA.투자자산,
    공모주:(DATA.공모주||[]), 연금보험:DATA.연금보험, 대출:(DATA.대출||[]), 현금흐름:DATA.현금흐름, 용돈:(DATA.용돈||[])
  };
  // 동산만기 계산 시트 추가
  const mat=DATA.동산.map(r=>{const m=maturityCalc(r);return {
    금융기관:r.금융기관,투자구분:r.투자구분,명의자:r.명의자,예치금액:num(r.예치금액),
    금리:r.금리,시작일:r.시작일,개월:r.개월,만기일:m.matDate,
    예상이자:Math.round(m.interest),세금:Math.round(m.tax),세후만기금액:Math.round(m.net)};});
  Object.entries(sheets).forEach(([name,arr])=>{
    const clean=arr.map(({id,...rest})=>rest);
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(clean.length?clean:[{}]),name);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(mat.length?mat:[{}]),"동산만기");
  const snap=(DATA.스냅샷||[]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(snap.length?snap:[{}]),"자산추이");
  const stamp=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`자산관리_백업_${stamp}.xlsx`);
  toast("📤 백업 엑셀 저장 완료 ("+stamp+")");
}

function importCategoryFile(ev){
  const file=ev.target.files[0], cat=uploadCat;

  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array",cellDates:true});
      const sn = wb.SheetNames.find(n=>SHEET_MAP[n.trim()]===cat) || wb.SheetNames[0];

      let added=0;
      json.forEach(row=>{
        const o={id:uid()}; let has=false;
        Object.entries(row).forEach(([k,v])=>{
          if(v==="") return;
          o[normField(cat,k)] = (v instanceof Date)? v.toISOString().slice(0,10) : v;
          has=true;
        });
        if(cat==="현금흐름" && o.내용 && !o.분류){ const m=autoCat(o.내용); if(m) o.분류=m; }

    }catch(err){ alert("업로드 실패: "+err.message); }

let pv={cat:"동산", row:"명의자", col:"투자구분", val:"예치금액", agg:"합계"};
function pivotFields(cat){

}
function rPivot(c){

    <label>값</label>
    <select onchange="pv.val=this.value;render()"><option value="">(건수)</option>${fields.map(f=>`<option ${f===pv.val?'selected':''}>${f}</option>`).join("")}</select>
    <label>집계</label>
    <select onchange="pv.agg=this.value;render()">${["합계","개수","평균","최대","최소"].map(a=>`<option ${a===pv.agg?'selected':''}>${a}</option>`).join("")}</select>
    <button class="addbtn" onclick="exportPivot()">📤 피벗 내보내기</button>
  </div>
  ${renderPivotTable()}`;
}
function aggregate(vals,agg){
  if(agg==="개수") return vals.length;
  const nums=vals.map(v=>num(v));
  if(!nums.length) return 0;
  if(agg==="합계") return nums.reduce((a,b)=>a+b,0);
  if(agg==="평균") return nums.reduce((a,b)=>a+b,0)/nums.length;
  if(agg==="최대") return Math.max(...nums);
  if(agg==="최소") return Math.min(...nums);
  return 0;
}
function pivotData(){
  const recs=DATA[pv.cat]||[];
  const rowKeys=[...new Set(recs.map(r=>r[pv.row]||"(없음)"))].sort();
  const colKeys = pv.col ? [...new Set(recs.map(r=>r[pv.col]||"(없음)"))].sort() : [null];
  const cell={};
  rowKeys.forEach(rk=>{ cell[rk]={}; colKeys.forEach(ck=>cell[rk][ck]=[]); });
  recs.forEach(r=>{
    const rk=r[pv.row]||"(없음)", ck = pv.col ? (r[pv.col]||"(없음)") : null;
    const v = pv.val ? r[pv.val] : 1;
    if(cell[rk] && cell[rk][ck]) cell[rk][ck].push(v);
  });
  return {rowKeys,colKeys,cell};
}
const fmtPv = v => Math.round(v).toLocaleString("ko-KR");
function renderPivotTable(){
  const recs=DATA[pv.cat]||[];
  if(!recs.length) return emptyBox(`'${pv.cat}' 데이터가 없습니다. 해당 탭에서 입력하거나 엑셀을 업로드하세요.`);
  const {rowKeys,colKeys,cell}=pivotData();
  const colLabel=c=>c==null?(pv.val||"건수"):c;
  let head=`<th>${esc(pv.row)}</th>`+colKeys.map(c=>`<th class="num">${esc(colLabel(c))}</th>`).join("")+`<th class="num">합계</th>`;
  let body="", colTotals={};
  colKeys.forEach(c=>colTotals[c]=[]);
  rowKeys.forEach(rk=>{
    let rowVals=[];
    const tds=colKeys.map(ck=>{
      const arr=cell[rk][ck]||[]; rowVals=rowVals.concat(arr); colTotals[ck]=colTotals[ck].concat(arr);
      return `<td class="num">${arr.length?fmtPv(aggregate(arr,pv.agg)):'-'}</td>`;
    }).join("");
    body+=`<tr><td>${esc(rk)}</td>${tds}<td class="num" style="font-weight:700">${fmtPv(aggregate(rowVals,pv.agg))}</td></tr>`;
  });
  let allVals=[];
  const foot=colKeys.map(ck=>{ allVals=allVals.concat(colTotals[ck]); return `<td class="num">${fmtPv(aggregate(colTotals[ck],pv.agg))}</td>`; }).join("");
  return `<div class="tablewrap"><table>
    <thead><tr>${head}</tr></thead><tbody>${body}</tbody>
    <tfoot><tr><td>합계</td>${foot}<td class="num">${fmtPv(aggregate(allVals,pv.agg))}</td></tr></tfoot></table></div>
    <p class="sub" style="margin-top:10px">📊 <b>${esc(pv.val||'건수')}</b> 의 <b>${pv.agg}</b> · 데이터원본: <b>${pv.cat}</b> (${recs.length}건)${pv.val?'':' · 값을 비우면 건수를 셉니다'}</p>`;
}
function exportPivot(){
  const {rowKeys,colKeys,cell}=pivotData();
  const colLabel=c=>c==null?(pv.val||"건수"):c;
  const aoa=[[pv.row,...colKeys.map(colLabel),"합계"]];
  rowKeys.forEach(rk=>{
    let rowVals=[]; const row=[rk];
    colKeys.forEach(ck=>{ const arr=cell[rk][ck]||[]; rowVals=rowVals.concat(arr); row.push(arr.length?Math.round(aggregate(arr,pv.agg)):""); });
    row.push(Math.round(aggregate(rowVals,pv.agg))); aoa.push(row);
  });
  const ws=XLSX.utils.aoa_to_sheet(aoa), wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"피벗");
  XLSX.writeFile(wb,`피벗_${pv.cat}.xlsx`);
  toast("📤 피벗 내보내기 완료");
}

/* ========================== 차트 (의존성 없는 SVG) ========================== */
function svgDonut(segs,size=140){
  const list=segs.filter(s=>num(s.value)>0);
  const total=list.reduce((s,x)=>s+num(x.value),0);
  const cx=size/2, cy=size/2, r=size/2-12, C=2*Math.PI*r;
  if(!total) return `<svg width="${size}" height="${size}"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#eef2f5" stroke-width="20"/></svg>`;
  let off=0;
  const arcs=list.map(s=>{
    const len=num(s.value)/total*C;
    const c=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="20"
      stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}"
      transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=len; return c;
  }).join("");
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${arcs}
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="11" fill="#7a8a99">총자산</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2d3d">${eok(total)}</text></svg>`;
}
function svgLine(pts,w=900,h=200){
  if(!pts || pts.length<2)
    return `<div class="empty">데이터가 2개월 이상 쌓이면 추이가 표시됩니다. 위 '스냅샷 저장' 버튼을 매달 눌러보세요.</div>`;
  const pad=40, xs=(w-pad*2)/(pts.length-1);
  const vals=pts.map(p=>p.value), mx=Math.max(...vals), mn=Math.min(...vals,0);
  const ny=v=>h-pad-(mx===mn?0.5*(h-pad*2):(v-mn)/(mx-mn)*(h-pad*2));
  const co=pts.map((p,i)=>[pad+i*xs, ny(p.value)]);
  const line=co.map((c,i)=>(i?'L':'M')+c[0].toFixed(1)+' '+c[1].toFixed(1)).join(' ');
  const area=`M${co[0][0].toFixed(1)} ${h-pad} `+co.map(c=>'L'+c[0].toFixed(1)+' '+c[1].toFixed(1)).join(' ')+` L${co[co.length-1][0].toFixed(1)} ${h-pad} Z`;
  const dots=co.map(c=>`<circle cx="${c[0].toFixed(1)}" cy="${c[1].toFixed(1)}" r="3.5" fill="#3ba8c4"/>`).join("");
  const labs=pts.map((p,i)=>`<text x="${(pad+i*xs).toFixed(1)}" y="${h-12}" font-size="10" fill="#7a8a99" text-anchor="middle">${esc(p.label)}</text>`).join("");
  const vlabs=co.map((c,i)=>`<text x="${c[0].toFixed(1)}" y="${(c[1]-9).toFixed(1)}" font-size="9.5" fill="#3ba8c4" text-anchor="middle" font-weight="700">${eok(pts[i].value)}</text>`).join("");
  return `<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
    <path d="${area}" fill="rgba(98,196,220,.14)"/><path d="${line}" fill="none" stroke="#3ba8c4" stroke-width="2.5"/>
    ${dots}${vlabs}${labs}</svg>`;
}
function monthlyCash(){
  const map={};
  DATA.현금흐름.forEach(r=>{ const ym=(r.일자||"").slice(0,7); if(!ym) return;
    map[ym]=map[ym]||{ym,수입:0,지출:0}; map[ym][r.구분==="수입"?"수입":"지출"]+=num(r.금액); });
  return Object.values(map).sort((a,b)=>a.ym.localeCompare(b.ym)).slice(-12);
}
function svgBars(months,w=520,h=150){
  if(!months.length) return `<div class="empty" style="padding:20px">현금흐름 데이터가 없습니다.</div>`;
  const pad=18, n=months.length, gw=(w-pad*2)/n;
  const mx=Math.max(1,...months.map(m=>Math.max(m.수입,m.지출)));
  const bars=months.map((m,i)=>{
    const x=pad+i*gw, bw=Math.min(16,gw*0.32);
    const ih=(m.수입/mx)*(h-pad*2), eh=(m.지출/mx)*(h-pad*2);
    return `<rect x="${(x+gw/2-bw-1).toFixed(1)}" y="${(h-pad-ih).toFixed(1)}" width="${bw.toFixed(1)}" height="${ih.toFixed(1)}" fill="#2e9e6b" rx="2"/>
      <rect x="${(x+gw/2+1).toFixed(1)}" y="${(h-pad-eh).toFixed(1)}" width="${bw.toFixed(1)}" height="${eh.toFixed(1)}" fill="#d6536d" rx="2"/>
      <text x="${(x+gw/2).toFixed(1)}" y="${h-5}" font-size="9" fill="#7a8a99" text-anchor="middle">${m.ym.slice(5)}</text>`;
  }).join("");
  return `<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${bars}</svg>`;
}

/* ========================== 순자산 스냅샷 (추이) ========================== */
function snapKey(){ return new Date().toISOString().slice(0,7); }
function takeSnapshot(auto){
  const t=totals(), ym=snapKey();
  DATA.스냅샷=DATA.스냅샷||[];
  const snap={ym, 순자산:t.순자산, 총자산:t.총자산, 동산:t.동산, 부동산:t.부동산, 투자:t.투자, 연금:t.연금, 부채:t.부채};
  const i=DATA.스냅샷.findIndex(s=>s.ym===ym);

function generateRecurring(){
  DATA.반복=DATA.반복||[]; DATA.설정=DATA.설정||{};
  if(!DATA.반복.length) return 0;
  const ym=snapKey(); let added=0;
  DATA.반복.forEach(r=>{
    const day=String(r.일||1).padStart(2,'0'), date=ym+"-"+day;
    if(!DATA.현금흐름.some(x=>x.일자===date && x.내용===r.내용 && String(x.금액)===String(r.금액))){
      DATA.현금흐름.push({id:uid(),일자:date,구분:r.구분,분류:r.분류,내용:r.내용,금액:r.금액,명의자:r.명의자,반복:"Y"});
      added++;
    }
  });
  DATA.설정.lastGen=ym;
  if(added) save();
  return added;
}

/* ========================== 월간 리포트 / 구독 ========================== */
function ymOffset(n){ const d=new Date(); d.setMonth(d.getMonth()+n); return d.toISOString().slice(0,7); }
function monthAgg(ym){
  let inc=0,exp=0; const byCat={};
  DATA.현금흐름.forEach(r=>{ if((r.일자||"").slice(0,7)!==ym) return;
    const a=num(r.금액);
    if(r.구분==="수입") inc+=a; else { exp+=a; byCat[r.분류]=(byCat[r.분류]||0)+a; } });
  return {inc,exp,net:inc-exp,byCat};
}
function deltaTxt(d,expense){
  if(!d) return "전월과 동일";
  const up=d>0, arrow=up?"▲":"▼";
  const color = expense ? (up?"var(--red)":"var(--green)") : (up?"var(--green)":"var(--red)");
  return `<span style="color:${color}">${arrow} ${eok(Math.abs(d))} (전월 대비)</span>`;
}
function subscriptions(){
  const out=[];
  (DATA.반복||[]).filter(r=>r.구분==="지출").forEach(r=>out.push({내용:r.내용||"(무제목)",분류:r.분류,월금액:num(r.금액),src:"반복"}));
  DATA.현금흐름.filter(r=>r.구분==="지출"&&r.분류==="구독"&&r.내용).forEach(r=>{
    const k=String(r.내용).trim(); if(!out.some(o=>o.내용===k)) out.push({내용:k,분류:"구독",월금액:num(r.금액),src:"구독"});
  });
  const grp={};
  DATA.현금흐름.filter(r=>r.구분==="지출"&&r.내용).forEach(r=>{
    const k=String(r.내용).trim(); grp[k]=grp[k]||{months:new Set(),amts:[]};
    grp[k].months.add((r.일자||"").slice(0,7)); grp[k].amts.push(num(r.금액));
  });
  Object.entries(grp).forEach(([k,g])=>{
    if(g.months.size>=2 && !out.some(o=>o.내용===k)){
      const avg=Math.round(g.amts.reduce((a,b)=>a+b,0)/g.amts.length);
      out.push({내용:k,분류:"(자동감지)",월금액:avg,src:"auto"});
    }
  });
  return out.sort((a,b)=>b.월금액-a.월금액);
}

/* ========================== 금융 캘린더 / 현금흐름 예측 ========================== */
function collectEvents(maxDays){
  const events=[];
  DATA.동산.forEach(r=>{ const m=maturityCalc(r); if(m.matDate){ const d=daysUntil(m.matDate);
    if(d!=null&&d>=0&&d<=maxDays) events.push({date:m.matDate,d,type:"예적금 만기",color:"var(--sky-d)",desc:`${r.금융기관||''} ${r.투자구분||''} (${won(m.net)})`}); }});
  (DATA.대출||[]).forEach(r=>{ if(r.만기일){ const d=daysUntil(r.만기일);
    if(d!=null&&d>=0&&d<=maxDays) events.push({date:r.만기일,d,type:"대출 만기",color:"var(--red)",desc:`${r.금융기관||''} ${r.종류||''} (잔액 ${won(r.잔액)})`}); }});
  (DATA.반복||[]).forEach(r=>{ for(let k=0;k<3;k++){ const ym=ymOffset(k), day=String(r.일||1).padStart(2,'0'), date=ym+"-"+day, d=daysUntil(date);
    if(d!=null&&d>=0&&d<=maxDays) events.push({date,d,type:r.구분==="수입"?"수입 예정":"지출 예정",color:r.구분==="수입"?"var(--green)":"var(--amber)",desc:`${r.내용||''} (${won(r.금액)})`}); }});
  (DATA.공모주||[]).forEach(r=>{ [["청약일","공모주 청약"],["환불일","공모주 환불"],["상장일","공모주 상장"]].forEach(([f,t])=>{
    if(r[f]){ const d=daysUntil(r[f]); if(d!=null&&d>=0&&d<=maxDays) events.push({date:r[f],d,type:t,color:"#7c5cd6",desc:`${r.종목||''}${r.주관사?' ('+r.주관사+')':''}`}); } }); });
  return events.sort((a,b)=>a.date.localeCompare(b.date));
}
/* 만기·납입 브라우저 알림 */
function remindOn(){ return ("Notification" in window) && Notification.permission==="granted" && localStorage.getItem("remind")==="on"; }
function toggleReminders(){
  if(!("Notification" in window)){ alert("이 브라우저는 알림을 지원하지 않습니다."); return; }
  if(remindOn()){ localStorage.setItem("remind","off"); toast("🔕 알림 꺼짐"); render(); return; }
  Notification.requestPermission().then(p=>{
    if(p==="granted"){ localStorage.setItem("remind","on"); toast("🔔 알림 켜짐 — 7일 내 일정 알려드려요"); checkReminders(true); render(); }
    else toast("알림 권한이 거부되었습니다");
  });
}
function checkReminders(force){
  if(!remindOn()) return;
  const today=new Date().toISOString().slice(0,10);
  const log=JSON.parse(localStorage.getItem("remindLog")||"{}");
  collectEvents(7).forEach(e=>{
    const key=e.type+"|"+e.date+"|"+e.desc;
    if(log[key]===today && !force) return;
    try{ new Notification("💠 자산관리 알림",{body:`[D-${e.d}] ${e.type}: ${e.desc} · ${e.date}`}); log[key]=today; }catch(_){}
  });
  localStorage.setItem("remindLog",JSON.stringify(log));
}

/* ========================== 지출 자동분류 규칙 ========================== */
function autoCat(text){
  if(!text) return null;
  const rules=(DATA.설정&&DATA.설정.분류규칙)||[];
  const t=String(text).toLowerCase();
  for(const r of rules){ if(r.키워드 && t.includes(String(r.키워드).toLowerCase())) return r.분류; }
  return null;
}

      <button class="btn save" style="background:var(--green)" onclick="applyRulesAll()">🏷 기존 내역에 적용</button>
      <button class="btn cancel" onclick="closeModal()">닫기</button>
    </div>`;
  openModal(`<h3>🏷 지출 자동분류 규칙</h3>${body}`);
}
function addRule(){
  const k=document.getElementById("rl_k").value.trim(), cat=document.getElementById("rl_c").value;
  if(!k){ toast("키워드를 입력하세요"); return; }
  DATA.설정=DATA.설정||{}; DATA.설정.분류규칙=DATA.설정.분류규칙||[];
  DATA.설정.분류규칙.push({키워드:k,분류:cat}); save(); manageRules(); toast("규칙 추가됨");
}
function delRule(i){ DATA.설정.분류규칙.splice(i,1); save(); manageRules(); }
function applyRulesAll(){
  let n=0; DATA.현금흐름.forEach(r=>{ if(r.구분!=="수입"){ const m=autoCat(r.내용); if(m && r.분류!==m){ r.분류=m; n++; } } });
  save(); closeModal(); render(); toast(`🏷 ${n}건 분류 적용됨`);
}

window.getLocalData = ()=>DATA;

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBqViDPnufHyQGsexKT8PJokRv6wHN-6Ks",
  authDomain: "finance-49c1b.firebaseapp.com",
  projectId: "finance-49c1b",
  storageBucket: "finance-49c1b.firebasestorage.app",
  messagingSenderId: "293719683172",
  appId: "1:293719683172:web:ed31e6a5026aab82312f71"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const provider = new GoogleAuthProvider();
let curUser=null, unsub=null;

window.fb = {
  ready:true,
  signIn:()=> signInWithPopup(auth, provider).catch(e=>alert("로그인 실패: "+e.code+"\n"+e.message)),
  signOut:()=> signOut(auth),
  save:(data)=>{ if(curUser) setDoc(doc(db,"users",curUser.uid),{data, updated:Date.now()}).catch(e=>console.warn("save",e)); }
};

onAuthStateChanged(auth,(user)=>{
  curUser=user;
  if(unsub){ unsub(); unsub=null; }
  if(user){
    const ref=doc(db,"users",user.uid);
    unsub=onSnapshot(ref,(snap)=>{
      if(snap.exists()){ const d=snap.data().data; if(d) window.onCloudData(d); }
      else { window.fb.save(window.getLocalData()); }   // 최초 로그인: 로컬 데이터를 클라우드로 올림
    },(err)=>console.warn("snapshot",err));
  }
  window.onAuthChange(user||null);
});
</script>
